[platformio]
src_dir = .

[env:lilygo-t-display]
platform = espressif32@7.0.0
board = esp32dev
framework = arduino
board_build.partitions = huge_app.csv
monitor_speed = 115200
upload_speed = 460800
lib_ldf_mode = deep
lib_deps =
  bodmer/TFT_eSPI@2.5.43
  https://github.com/takkaO/OpenFontRender.git#a9acf5498ed058a034acaa1becbad790627b9ec1
build_flags =
  -D USER_SETUP_LOADED
  -D USER_SETUP_ID=25
  -D ST7789_DRIVER
  -D TFT_SDA_READ
  -D TFT_WIDTH=135
  -D TFT_HEIGHT=240
  -D CGRAM_OFFSET
  -D TFT_MOSI=19
  -D TFT_SCLK=18
  -D TFT_CS=5
  -D TFT_DC=16
  -D TFT_RST=23
  -D TFT_BL=4
  -D TFT_BACKLIGHT_ON=HIGH
  -D LOAD_GLCD
  -D LOAD_FONT2
  -D LOAD_FONT4
  -D LOAD_FONT6
  -D LOAD_FONT7
  -D LOAD_FONT8
  -D LOAD_GFXFF
  -D SMOOTH_FONT
  -D SPI_FREQUENCY=40000000
  -D SPI_READ_FREQUENCY=6000000
